<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFMT | Planejador Acadêmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="brand">
            <h1>UFMT</h1>
            <span>Planejador Acadêmico</span>
        </div>

        <div class="student-info">
            <div class="input-row">
                <input type="text" id="alunoNome" placeholder="Nome do Discente" oninput="salvarInfoAdicional()">
                <input type="text" id="alunoSEI" placeholder="Processo SEI" oninput="salvarInfoAdicional()">
            </div>
            <div class="academic-config">
                <div class="config-item">
                    <label>Ingresso:</label>
                    <input type="number" id="ingressoAno" value="2022" oninput="salvarInfoAdicional()">
                    <select id="ingressoSemestre" onchange="salvarInfoAdicional()">
                        <option value="1">1º Sem</option>
                        <option value="2">2º Sem</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>PPC Ingresso:</label>
                    <select id="ppcIngresso" onchange="salvarInfoAdicional()">
                        <option value="2014">2014</option>
                        <option value="2020">2020</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>Trancamentos:</label>
                    <input type="number" id="trancamentos" value="0" min="0" oninput="salvarInfoAdicional()">
                </div>
            </div>
        </div>

        <div class="actions">
            <button onclick="gerarPDF()" class="btn-outline">📄 PDF</button>
            <button onclick="exportarExcel()" class="btn-outline">📊 Excel</button>
            <button onclick="exportarJSON()" class="btn-outline">📤 Exportar</button>
            <button onclick="document.getElementById('inputImport').click()" class="btn-outline">📥 Importar</button>
            <input type="file" id="inputImport" style="display:none" accept=".json" onchange="importarJSON(event)">
            <button onclick="addSemestre()" class="btn-primary">+ Semestre</button>
            <button onclick="limparDados()" class="btn-danger-outline">Resetar</button>
        </div>
    </div>
</header>

<main class="app-layout">
    <!-- Dashboard de Cálculos e Progresso -->
    <div id="painelPrazos" class="painel-prazos"></div>

    <!-- 1. Fluxograma (Topo) -->
    <section class="secao-historico">
        <header class="section-header">
            <h3>1. Fluxograma de Disciplinas (Clique para marcar como Cursada)</h3>
            <div class="filtro-box">
                <label>Ver Oferta PPC:</label>
                <select id="filtroPPC" onchange="renderizarTudo()">
                    <option value="20251">2025/1</option>
                    <option value="20261" selected>2026/1</option>
                </select>
            </div>
        </header>
        <div id="checklistObrigatorias" class="kanban-container"></div>
    </section>

    <!-- 2 e 3. Pendências e Planejamento -->
    <div class="planejamento-split">
        <aside class="sidebar-pendencias">
            <h3>2. Pendências</h3>
            <div id="listaDisponiveis" class="lista-vertical-cards"></div>
        </aside>

        <section class="area-grade">
            <h3>3. Planejamento</h3>
            <div id="gradeSemestres" class="kanban-container"></div>
        </section>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
