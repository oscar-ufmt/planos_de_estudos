<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFMT | Planejador Acadêmico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-container">
        <div class="brand">
            <h1>UFMT</h1>
            <span>Planejador Acadêmico</span>
        </div>

        <div class="student-info">
            <input type="text" id="alunoNome" placeholder="Nome do Discente" oninput="salvarInfoAdicional()">
            <input type="text" id="alunoRGA" placeholder="RGA" oninput="salvarInfoAdicional()">
            <input type="text" id="alunoSEI" placeholder="Processo SEI" oninput="salvarInfoAdicional()" maxlength="100">
        </div>

        <div class="controles">
            <div class="ppc-selector">
                <label for="filtroPPC">PPC:</label>
                <select id="filtroPPC" onchange="renderizarTudo()">
                    <option value="20251">2025/1</option>
                    <option value="20261" selected>2026/1</option>
                </select>
            </div>

            <div class="actions">
                <button onclick="gerarPDF()" class="btn-outline">📄 PDF</button>
                <button onclick="exportarExcel()" class="btn-outline">📊 Excel</button>
                <button onclick="addSemestre()" class="btn-primary">+ Novo Semestre</button>
                <button onclick="limparDados()" class="btn-danger-outline">Resetar</button>
            </div>
        </div>
    </div>
</header>

<main class="app-layout">
    <section class="secao-historico">
        <header class="section-header">
            <h2>1. Histórico Escolar & Fluxograma</h2>
            <p>Verde: Cursadas | Azul: Planejadas (indica o semestre de oferta)</p>
        </header>
        <div id="checklistObrigatorias" class="kanban-container"></div>
    </section>

    <div class="planejamento-split">
        <aside class="sidebar-pendencias">
            <header class="section-header">
                <h3>2. Pendências</h3>
            </header>
            <div id="listaDisponiveis" class="lista-vertical-cards"></div>
        </aside>

        <section class="area-grade">
            <header class="section-header">
                <h3>3. Planejamento Próximos Semestres</h3>
            </header>
            <div id="gradeSemestres" class="kanban-container"></div>
        </section>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
